input {
  beats {
    port => "5044"
}

}

filter {
  dissect {
    mapping => {
      "message" => '%{date_time} %{+date_time} %{src} %{severity} %{msg}'
    }
  }

  grok {
    match => { "msg" => "[Pp]rocess %{NUMBER:pid}" }
  }

  if [severity] == "DEBUG" {
    drop { }
  }
}

output {
  opensearch {
    hosts            => ["https://opensearch-node1:9200"]
    user             => "admin"
    password         => "${OPENSEARCH_INITIAL_ADMIN_PASSWORD}"
    index            => "%{src}-index"
    ssl_certificate_verification => false
  }
}

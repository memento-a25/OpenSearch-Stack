# ============================== Filebeat inputs ===============================

filebeat.inputs:

- type: filestream
  id: jet-lab
  enabled: true
  paths:
    - /var/log/app/jet.log

# ================================== Outputs ===================================

# Configure what output to use when sending the data collected by the beat.

output.logstash:
  # Array of hosts to connect to.
  hosts: ["logstash:5044"]
